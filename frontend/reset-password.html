<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | WECARE Hub</title>
    <link rel="icon" href="/assets/favicon-heart.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
      <script src="/config.js"></script>
  </head>
  <body>
    <main class="auth-shell">
      <section class="auth-layout">
        <article class="auth-info">
          <p class="kicker">Secure Reset</p>
          <h1>Create a new password</h1>
          <p class="lead">Choose a strong password to secure your WECARE account.</p>
          <div class="action-row">
            <a class="btn btn-secondary" href="/login.html">Back to Login</a>
          </div>
        </article>

        <article class="auth-card">
          <h2>Reset Password</h2>
          <p class="helper">Enter your new password below.</p>

          <div id="notice" class="notice"></div>

          <form id="resetPasswordForm">
            <input id="resetToken" name="token" type="hidden" />

            <div class="field">
              <label for="password">New Password</label>
              <input id="password" name="password" type="password" minlength="8" required />
            </div>

            <div class="field">
              <label for="confirmPassword">Confirm Password</label>
              <input id="confirmPassword" name="confirmPassword" type="password" minlength="8" required />
            </div>

            <button class="btn btn-primary" type="submit">Update Password</button>
          </form>
        </article>
      </section>
    </main>

    <script type="module" src="/auth.js"></script>
  </body>
</html>
