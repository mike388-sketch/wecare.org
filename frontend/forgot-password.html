<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password | WECARE Hub</title>
    <link rel="icon" href="/assets/favicon-heart.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
      <script src="/config.js"></script>
  </head>
  <body>
    <main class="auth-shell">
      <section class="auth-layout">
        <article class="auth-info">
          <p class="kicker">Password Recovery</p>
          <h1>Reset your WECARE password</h1>
          <p class="lead">Enter your email and we’ll send a reset link if the account exists.</p>
          <div class="action-row">
            <a class="btn btn-secondary" href="/login.html">Back to Login</a>
          </div>
        </article>

        <article class="auth-card">
          <h2>Forgot Password</h2>
          <p class="helper">We’ll send a reset link to your email.</p>

          <div id="notice" class="notice"></div>

          <form id="forgotPasswordForm">
            <div class="field">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" autocomplete="email" required />
            </div>

            <button class="btn btn-primary" type="submit">Send Reset Link</button>
          </form>
        </article>
      </section>
    </main>

    <script type="module" src="/auth.js"></script>
  </body>
</html>
